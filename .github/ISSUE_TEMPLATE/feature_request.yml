name: 功能请求
description: 为 JadeView 动态库提出新功能或改进建议
title: "[FEATURE] "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        **JadeView** 是基于 Rust 的 WebView 窗口库，对外提供 **C 兼容 API**（可供易语言等调用）。请尽量说明需求背景与使用场景，便于评估与排期。
  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      description: 与仓库 docs 目录中的 API 分类对应，选最接近的一项。
      options:
        - 核心（初始化、消息循环、清理等）
        - 窗口管理（创建、关闭等）
        - 窗口属性与状态（标题、大小、置顶等）
        - WebView（导航、执行 JavaScript 等）
        - 事件系统（回调、事件类型等）
        - 主题与背景材料（Light/Dark、Mica/Acrylic 等）
        - IPC 通信
        - 本地服务器与自定义协议
        - FFI、内存与安全相关
        - 文档、示例或易语言封装
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望增加或改变什么；若涉及新 API，可写期望的函数名或参数形态（不确定也可说明「待定」）。
      placeholder: |
        例如：希望在现有某某 API 旁增加……；或需要一种在宿主侧与页面之间传递……的方式。
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 动机与使用场景
      description: 谁在用（易语言 / C 调用方 / 其他）、什么场景、解决什么问题；若有现成绕路方案也可简述。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的 API 或行为细节（可选）
      description: 若你有 ABI、回调约定、事件名、与 wry/WebView2 行为对齐等方面的想法，可在此说明。
      render: markdown
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 若考虑过其他实现方式或第三方方案，可在此列出。
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 相关 Issue/PR、参考链接、示意图或易语言侧伪代码等。

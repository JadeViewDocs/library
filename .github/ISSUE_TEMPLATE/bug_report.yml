name: Bug 反馈
description: 报告问题以帮助我们改进
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量填写完整信息，便于我们复现与修复。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述问题是什么。
      placeholder: 例如：在某某操作后出现崩溃 / 界面显示异常……
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 重现步骤
      description: 如何一步步复现该问题。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望的正确结果是什么。
    validations:
      required: true
  - type: textarea
    id: logs_screenshots
    attributes:
      label: 日志与截图
      description: 如有报错日志、控制台输出或截图，请粘贴或说明。
      render: markdown
  - type: input
    id: app_version
    attributes:
      label: JadeView 版本
      description: 例如 1.1.0
      placeholder: 例如 1.1.0
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: 系统版本
      description: 例如 Windows 11 24H2
      placeholder: 例如 Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: 其他说明
      description: 任何有助于理解问题的补充信息。

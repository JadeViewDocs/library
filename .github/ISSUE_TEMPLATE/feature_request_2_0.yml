name: 2.0 功能请求
description: 针对 JadeView 2.0 版本的功能或改进建议
title: "[FEATURE-2.0] "
labels:
  - feature
  - "2.0"
body:
  - type: markdown
    attributes:
      value: |
        本模板用于 **2.0 路线图**。**JadeView** 为 Rust WebView 动态库，提供 **C 兼容 API**。请说明需求与场景，便于评估优先级与排期。
  - type: dropdown
    id: area
    attributes:
      label: 涉及模块
      description: 与文档中的能力划分对应，选最接近的一项。
      options:
        - 核心（初始化、消息循环、清理等）
        - 窗口管理（创建、关闭等）
        - 窗口属性与状态（标题、大小、置顶等）
        - WebView（导航、执行 JavaScript 等）
        - 事件系统（回调、事件类型等）
        - 主题与背景材料（Light/Dark、Mica/Acrylic 等）
        - IPC 通信
        - 本地服务器与自定义协议
        - FFI、内存与安全相关
        - 文档、示例或易语言封装
        - 其他
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: 目标平台
      description: 当前主要支持 Windows x86 / x64；若 2.0 有跨平台设想也可在此选项中体现。
      options:
        - Windows x86
        - Windows x64
        - x86 与 x64 均需
        - 与具体架构无关（如仅文档或通用行为）
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 你希望 2.0 增加或改变什么；可写期望的 API 形态或行为（不确定可写「待定」）。
      placeholder: |
        例如：2.0 中希望提供……能力，或与 1.x 在某某行为上保持兼容/明确破坏性变更。
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 动机与使用场景
      description: 调用方类型、业务场景、与 1.x 的关系（若适用）。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的 API 或行为细节（可选）
      description: ABI、兼容性、与 wry/WebView2 对齐等方面的想法。
      render: markdown
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案（可选）
      description: 其他实现思路或第三方方案。
  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 相关链接、示意图、易语言侧伪代码等。
